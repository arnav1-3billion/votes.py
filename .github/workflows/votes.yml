name: Track Votes
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run tracker
        run: python votes.py
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add votes.json
          git commit -m "Update votes $(date)" || echo "No changes"
          git push
